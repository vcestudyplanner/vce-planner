<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCE Study Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%231a1714'/><rect x='12' y='10' width='26' height='34' rx='3' fill='none' stroke='%23e8a87c' stroke-width='2.5'/><line x1='19' y1='20' x2='31' y2='20' stroke='%23e8a87c' stroke-width='2' stroke-linecap='round'/><line x1='19' y1='27' x2='31' y2='27' stroke='%23e8a87c' stroke-width='2' stroke-linecap='round'/><line x1='19' y1='34' x2='25' y2='34' stroke='%23e8a87c' stroke-width='2' stroke-linecap='round'/><circle cx='46' cy='46' r='13' fill='%23c84b2f'/><line x1='46' y1='39' x2='46' y2='46' stroke='white' stroke-width='2.5' stroke-linecap='round'/><line x1='46' y1='46' x2='50' y2='50' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#111010;color:#f0ede8;min-height:100vh;display:flex;flex-direction:column}
.land-header{background:#0e0d0c;padding:0 2rem;height:54px;display:flex;align-items:center;border-bottom:1px solid #2e2b28}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#fff;display:flex;align-items:center;gap:8px}
.logo span{color:#e8a87c}
.logo svg{flex-shrink:0}
.land-main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}

/* AUTH CARD */
.auth-card{background:#1e1c1a;border:1px solid #2e2b28;border-radius:20px;padding:2rem;width:100%;max-width:420px}
.auth-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:.3rem}
.auth-sub{font-size:13px;color:#8a8078;margin-bottom:1.5rem}
.auth-tabs{display:flex;gap:4px;background:#111010;border-radius:10px;padding:4px;margin-bottom:1.5rem}
.auth-tab{flex:1;padding:7px;border-radius:7px;border:none;background:transparent;color:#8a8078;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.auth-tab.active{background:#2e2b28;color:#f0ede8}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:.85rem}
.fg label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#7a7068}
input[type=text],input[type=email],input[type=password]{width:100%;height:42px;padding:0 12px;background:#111010;border:1px solid #2e2b28;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0ede8;outline:none;transition:border-color .15s}
input:focus{border-color:#e8693a}
.abtn{width:100%;height:42px;background:#c84b2f;color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:.25rem}
.abtn:hover{background:#e8693a}
.abtn:disabled{opacity:.5;cursor:default}
.err-msg{background:rgba(200,75,47,.15);border:1px solid rgba(200,75,47,.4);border-radius:9px;padding:.6rem .9rem;font-size:13px;color:#e8693a;margin-bottom:.85rem;display:none}
.err-msg.show{display:block}
.ok-msg{background:rgba(45,107,58,.15);border:1px solid rgba(45,107,58,.4);border-radius:9px;padding:.6rem .9rem;font-size:13px;color:#4a9858;margin-bottom:.85rem;display:none}
.ok-msg.show{display:block}

/* STEPS */
.step{display:none}.step.active{display:block}

/* SETUP STEP */
.setup-card{background:#1e1c1a;border:1px solid #2e2b28;border-radius:20px;padding:2rem;width:100%;max-width:820px}
.step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;flex-shrink:0}
.step-dot.done{background:#c84b2f;color:#fff}
.step-dot.current{background:#2e2b28;color:#f0ede8;border:2px solid #c84b2f}
.step-dot.future{background:#1e1c1a;color:#7a7068;border:2px solid #2e2b28}
.step-line{flex:1;height:1px;background:#2e2b28}

/* SUBJECT PICKER */
.subj-search{width:100%;height:40px;padding:0 12px;background:#111010;border:1px solid #2e2b28;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:#f0ede8;outline:none;transition:border-color .15s;margin-bottom:1rem}
.subj-search:focus{border-color:#e8693a}
.subj-category{margin-bottom:1.1rem}
.subj-cat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7a7068;margin-bottom:.5rem}
.subj-chips{display:flex;flex-wrap:wrap;gap:6px}
.subj-chip{padding:5px 12px;border-radius:20px;border:1px solid #2e2b28;background:#1e1c1a;color:#8a8078;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none}
.subj-chip:hover{border-color:#c84b2f;color:#f0ede8}
.subj-chip.selected{background:#c84b2f;border-color:#c84b2f;color:#fff}
.subj-scroll{max-height:380px;overflow-y:auto;padding-right:4px;margin-bottom:1rem}
.subj-scroll::-webkit-scrollbar{width:4px}.subj-scroll::-webkit-scrollbar-track{background:#111010}.subj-scroll::-webkit-scrollbar-thumb{background:#2e2b28;border-radius:2px}
.selected-preview{background:#111010;border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;min-height:44px}
.selected-preview-label{font-size:11px;color:#7a7068;margin-bottom:.4rem}
.selected-chips{display:flex;flex-wrap:wrap;gap:5px}
.sel-chip{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s}
.sel-chip:hover{opacity:.7}
.btn-row{display:flex;gap:10px}
.abtn-outline{flex:1;height:42px;background:transparent;color:#f0ede8;border:1px solid #2e2b28;border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.abtn-outline:hover{border-color:#c84b2f;color:#c84b2f}
.abtn.primary{flex:1}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header class="land-header">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 36 36"><rect width="36" height="36" rx="8" fill="#2a2520"/><rect x="7" y="8" width="15" height="20" rx="2" fill="none" stroke="#e8a87c" stroke-width="1.5"/><line x1="11" y1="14" x2="19" y2="14" stroke="#e8a87c" stroke-width="1.2" stroke-linecap="round"/><line x1="11" y1="18" x2="19" y2="18" stroke="#e8a87c" stroke-width="1.2" stroke-linecap="round"/><line x1="11" y1="22" x2="15" y2="22" stroke="#e8a87c" stroke-width="1.2" stroke-linecap="round"/><circle cx="26" cy="25" r="8" fill="#c84b2f"/><line x1="26" y1="21" x2="26" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="26" y1="25" x2="28.5" y2="27.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
    VCE <span>Study Planner</span>
  </div>
</header>

<main class="land-main">

  <!-- STEP 1: AUTH -->
  <div class="step active" id="step-auth">
    <div class="auth-card">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in or create your account to access your planner.</div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
      </div>
      <div id="auth-err" class="err-msg"></div>
      <div id="auth-ok" class="ok-msg"></div>
      <div class="fg"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com"/></div>
      <div class="fg"><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••"/></div>
      <button class="abtn" id="auth-btn" onclick="doAuth()">Sign In</button>
    </div>
  </div>

  <!-- STEP 2: NAME -->
  <div class="step" id="step-name">
    <div class="auth-card">
      <div class="step-indicator">
        <div class="step-dot done">1</div>
        <div class="step-line"></div>
        <div class="step-dot current">2</div>
        <div class="step-line"></div>
        <div class="step-dot future">3</div>
      </div>
      <div class="auth-title">What's your name?</div>
      <div class="auth-sub">This is how your planner will greet you.</div>
      <div id="name-err" class="err-msg"></div>
      <div class="fg" style="margin-bottom:1.25rem"><label>Your first name</label><input type="text" id="name-input" placeholder="e.g. Alex" maxlength="30"/></div>
      <button class="abtn" onclick="saveName()">Continue →</button>
    </div>
  </div>

  <!-- STEP 3: SUBJECTS -->
  <div class="step" id="step-subjects">
    <div class="setup-card">
      <div class="step-indicator">
        <div class="step-dot done">1</div>
        <div class="step-line"></div>
        <div class="step-dot done">2</div>
        <div class="step-line"></div>
        <div class="step-dot current">3</div>
      </div>
      <div class="auth-title">Choose your subjects</div>
      <div class="auth-sub" style="margin-bottom:1rem">Pick all the subjects you're studying. You can change these later in your planner.</div>
      <div id="subj-err" class="err-msg"></div>
      <input class="subj-search" type="text" placeholder="Search subjects…" oninput="filterSubjects(this.value)" id="subj-search"/>
      <div class="selected-preview">
        <div class="selected-preview-label">Selected: <span id="sel-count">0</span> subjects</div>
        <div class="selected-chips" id="sel-chips"></div>
      </div>
      <div class="subj-scroll" id="subj-list"></div>
      <div class="btn-row">
        <button class="abtn-outline" onclick="goBack()">← Back</button>
        <button class="abtn primary" id="launch-btn" onclick="saveSubjects()">Launch My Planner →</button>
      </div>
    </div>
  </div>

</main>

<script>
const SUPA_URL='https://pnjpalvpqpcgelwdpxzj.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuanBhbHZwcXBjZ2Vsd2RweHpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDg0ODgsImV4cCI6MjA5MjQyNDQ4OH0.YWn1-LkKAEAkG9uIuR19n350JlGtDpC9YtO053pU0BA';
const {createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);

const ALL_SUBJECTS=[
  {cat:'English',items:['English','English as an Additional Language (EAL)','English Language','Literature','Foundation English']},
  {cat:'Mathematics',items:['Mathematical Methods','Specialist Mathematics','Further Mathematics','General Mathematics','Foundation Mathematics']},
  {cat:'Sciences',items:['Biology','Chemistry','Physics','Psychology','Environmental Science']},
  {cat:'Health & Physical Education',items:['Health and Human Development','Physical Education','Outdoor and Environmental Studies']},
  {cat:'Humanities',items:['Geography','History: Revolutions','Modern History','Australian History','Classical Studies','Philosophy','Sociology','Australian and Global Politics']},
  {cat:'Business & Economics',items:['Legal Studies','Business Management','Accounting','Economics']},
  {cat:'Arts & Technology',items:['Art: Making and Exhibiting','Visual Communication Design','Media','Studio Arts','Product Design and Technology','Systems Engineering','Theatre Studies','Drama','Dance','Music: Performance','Music: Style and Composition','Music: Inquiry','Food Studies','Applied Computing','Algorithmics (HESS)','Software Development','Engineering Studies','Agricultural and Horticultural Studies']},
  {cat:'Languages',items:['Arabic','Armenian','Auslan','Bosnian','Chin Hakha','Chinese: First Language','Chinese: Second Language','Chinese: Second Language Advanced','Classical Greek','Classical Hebrew','Croatian','Dutch','Filipino','French','German','Modern Greek','Hindi','Hungarian','Indonesian: First Language','Indonesian: Second Language','Italian','Japanese: First Language','Japanese: Second Language','Karen','Khmer','Korean','Latin','Macedonian','Maltese','Persian','Polish','Portuguese','Punjabi','Romanian','Russian','Serbian','Sinhalese','Spanish','Tamil','Turkish','Ukrainian','Vietnamese: First Language','Vietnamese: Second Language']},
  {cat:'VET Certificates',items:['VET Agriculture','VET Applied Fashion Design & Technology','VET Beauty Therapy','VET Building and Construction','VET Business','VET Community Services','VET Creative and Digital Media','VET Dance','VET Engineering','VET Equine Studies','VET Financial Services','VET Health','VET Hospitality','VET Information Technology','VET Integrated Technologies','VET Laboratory Skills','VET Music Industry','VET Outdoor Recreation','VET Sport and Recreation','VET Tourism']},
  {cat:'VET Languages',items:['VET Language: Arabic','VET Language: Chinese (Mandarin)','VET Language: French','VET Language: German','VET Language: Greek','VET Language: Indonesian','VET Language: Italian','VET Language: Japanese','VET Language: Korean','VET Language: Spanish','VET Language: Turkish','VET Language: Vietnamese']},
];

const COLOR_NAMES=['Green','Purple','Blue','Gold','Teal','Rose','Orange','Indigo'];
let selectedSubjects=[];
let currentTab='login';
let pendingUserId=null;

// ── AUTH ──
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='signup')));
  document.getElementById('auth-btn').textContent=t==='login'?'Sign In':'Create Account';
  document.getElementById('auth-title'||'.auth-title').textContent='';
  clearMsg();
}

function clearMsg(){
  ['auth-err','auth-ok','name-err','subj-err'].forEach(id=>{
    const el=document.getElementById(id);if(el){el.classList.remove('show');el.textContent=''}
  });
}

function showErr(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.classList.add('show')}}
function showOk(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.classList.add('show')}}

async function doAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  clearMsg();
  if(!email||!pass){showErr('auth-err','Please fill in both fields.');return}
  const btn=document.getElementById('auth-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Loading…';

  if(currentTab==='login'){
    const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){showErr('auth-err',error.message);btn.disabled=false;btn.textContent='Sign In';return}
    await handleSignedIn(data.user);
  } else {
    const {data,error}=await sb.auth.signUp({email,password:pass});
    if(error){showErr('auth-err',error.message);btn.disabled=false;btn.textContent='Create Account';return}
    if(data.user&&data.user.identities&&data.user.identities.length===0){
      showErr('auth-err','An account with this email already exists. Please sign in instead.');
      btn.disabled=false;btn.textContent='Create Account';return;
    }
    pendingUserId=data.user?.id;
    await handleSignedIn(data.user,true);
  }
}

async function handleSignedIn(user,isNew=false){
  if(!user){
    document.getElementById('auth-btn').disabled=false;
    document.getElementById('auth-btn').textContent=currentTab==='login'?'Sign In':'Create Account';
    showErr('auth-err','Something went wrong. Please try again.');
    return;
  }
  const {data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  if(profile){
    // Returning user with profile - go straight to planner
    window.location.href='planner.html';
  } else {
    // New user - show name step
    showStep('step-name');
    document.getElementById('name-input').focus();
  }
}

// ── NAME STEP ──
async function saveName(){
  const name=document.getElementById('name-input').value.trim();
  clearMsg();
  if(!name){showErr('name-err','Please enter your name.');return}
  const {data:{user}}=await sb.auth.getUser();
  if(!user){showErr('name-err','Session expired. Please refresh.');return}
  const {error}=await sb.from('profiles').insert({id:user.id,name});
  if(error){showErr('name-err',error.message);return}
  showStep('step-subjects');
  renderSubjectList('');
}

// ── SUBJECT STEP ──
function filterSubjects(q){renderSubjectList(q.toLowerCase())}

function renderSubjectList(q){
  const container=document.getElementById('subj-list');
  container.innerHTML=ALL_SUBJECTS.map(cat=>{
    const items=cat.items.filter(s=>!q||s.toLowerCase().includes(q));
    if(!items.length)return'';
    return`<div class="subj-category">
      <div class="subj-cat-label">${cat.cat}</div>
      <div class="subj-chips">${items.map(s=>`<div class="subj-chip ${selectedSubjects.includes(s)?'selected':''}" onclick="toggleSubject('${s.replace(/'/g,"\\'")}')">
        ${s}</div>`).join('')}</div></div>`;
  }).join('');
}

function toggleSubject(s){
  const i=selectedSubjects.indexOf(s);
  if(i===-1){selectedSubjects.push(s)}else{selectedSubjects.splice(i,1)}
  renderSubjectList(document.getElementById('subj-search').value.toLowerCase());
  renderSelectedPreview();
}

function renderSelectedPreview(){
  document.getElementById('sel-count').textContent=selectedSubjects.length;
  const CHIP_COLORS=['#2d5a3d','#5a2d7a','#1e3a6e','#7a4a1e','#1a6a6a','#8b1a3a','#c06010','#2a2a8a'];
  document.getElementById('sel-chips').innerHTML=selectedSubjects.map((s,i)=>
    `<div class="sel-chip" style="background:${CHIP_COLORS[i%8]}22;color:${CHIP_COLORS[i%8]};border:1px solid ${CHIP_COLORS[i%8]}44" onclick="toggleSubject('${s.replace(/'/g,"\\'")}')">
      ${s} ×</div>`).join('');
}

async function saveSubjects(){
  clearMsg();
  if(selectedSubjects.length===0){showErr('subj-err','Please select at least one subject.');return}
  const btn=document.getElementById('launch-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Setting up…';
  const {data:{user}}=await sb.auth.getUser();
  if(!user){showErr('subj-err','Session expired. Please refresh.');btn.disabled=false;btn.textContent='Launch My Planner →';return}
  const rows=selectedSubjects.map((label,i)=>({user_id:user.id,label,color:(i%8)+1,display_order:i}));
  const {error}=await sb.from('subjects').insert(rows);
  if(error){showErr('subj-err',error.message);btn.disabled=false;btn.textContent='Launch My Planner →';return}
  window.location.href='planner.html';
}

// ── HELPERS ──
function showStep(id){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goBack(){showStep('step-auth')}

// ── INIT ──
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    const {data:profile}=await sb.from('profiles').select('id').eq('id',session.user.id).single();
    if(profile){window.location.href='planner.html';return}
    // Has session but no profile → show setup
    showStep('step-name');
    document.getElementById('name-input').focus();
  }
  document.getElementById('auth-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('auth-pass').focus()});
  document.getElementById('auth-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth()});
  document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')saveName()});
}

init();
</script>
</body>
</html>
